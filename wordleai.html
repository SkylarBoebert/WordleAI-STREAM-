<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<style>
body {
  background: transparent;
  font-family: Arial, sans-serif;
  text-align: center;
}

#board {
margin-top: 20px;
}

.row {
display: flex;
justify-content: center;
margin: 4px;
}

.tile {
width: 50px;
height: 50px;
margin: 3px;
line-height: 50px;
font-size: 24px;
font-weight: bold;
border: 2px solid #444;
text-transform: uppercase;
transition: transform 0.3s ease;
}

.green { background: #6aaa64; }
.yellow { background: #c9b458; }
.gray { background: #3a3a3c; }

.flip {
transform: rotateX(360deg);
}

#status {
margin-top: 15px;
font-size: 18px;
} </style>

</head>

<body>

<div id="board"></div>
<div id="status"></div>

<script>
// =========================
// WORD LIST (expand later)
// =========================
const WORDS = [
  "crane","slate","trace","adieu","roast","tears","stare","irate",
  "arise","raise","later","alert","alter","learn","snare","stone",
  "store","score","shore","spare","share","shard","chart","charm"
];

// =========================
// GAME STATE
// =========================
let target = randomWord();
let possibleWords = [...WORDS];
let guesses = [];
let turnDelay = 1500;

// =========================
// UTIL
// =========================
function randomWord() {
  return WORDS[Math.floor(Math.random() * WORDS.length)];
}

// =========================
// FEEDBACK SYSTEM
// =========================
function getFeedback(guess, target) {
  let result = Array(5).fill("gray");
  let targetArr = target.split("");

  // Greens
  for (let i = 0; i < 5; i++) {
    if (guess[i] === target[i]) {
      result[i] = "green";
      targetArr[i] = null;
    }
  }

  // Yellows
  for (let i = 0; i < 5; i++) {
    if (result[i] === "gray" && targetArr.includes(guess[i])) {
      result[i] = "yellow";
      targetArr[targetArr.indexOf(guess[i])] = null;
    }
  }

  return result;
}

// =========================
// AI FILTER
// =========================
function filterWords(words, guess, feedback) {
  return words.filter(word => {
    for (let i = 0; i < 5; i++) {
      if (feedback[i] === "green" && word[i] !== guess[i]) return false;
      if (feedback[i] === "yellow" && !word.includes(guess[i])) return false;
      if (feedback[i] === "gray" && word.includes(guess[i])) return false;
    }
    return true;
  });
}

// =========================
// AI GUESS (better than random)
// =========================
function aiGuess() {
  // prefer words with common letters
  let letterFreq = {};

  possibleWords.forEach(word => {
    for (let char of word) {
      letterFreq[char] = (letterFreq[char] || 0) + 1;
    }
  });

  let bestWord = possibleWords[0];
  let bestScore = -1;

  possibleWords.forEach(word => {
    let score = 0;
    let used = new Set();

    for (let char of word) {
      if (!used.has(char)) {
        score += letterFreq[char];
        used.add(char);
      }
    }

    if (score > bestScore) {
      bestScore = score;
      bestWord = word;
    }
  });

  return bestWord;
}

// =========================
// RENDER
// =========================
function render() {
  const board = document.getElementById("board");
  board.innerHTML = "";

  guesses.forEach(row => {
    const div = document.createElement("div");
    div.className = "row";

    row.guess.split("").forEach((letter, i) => {
      const tile = document.createElement("div");
      tile.className = "tile " + row.feedback[i];
      tile.innerText = letter;
      tile.classList.add("flip");
      div.appendChild(tile);
    });

    board.appendChild(div);
  });
}

// =========================
// GAME LOOP
// =========================
function playTurn() {
  if (guesses.length >= 6) {
    endGame(false);
    return;
  }

  let guess = aiGuess();
  let feedback = getFeedback(guess, target);

  guesses.push({ guess, feedback });
  possibleWords = filterWords(possibleWords, guess, feedback);

  render();

  if (guess === target) {
    endGame(true);
    return;
  }

  setTimeout(playTurn, turnDelay);
}

// =========================
// END GAME
// =========================
function endGame(win) {
  const status = document.getElementById("status");

  if (win) {
    status.innerText = "AI solved it!";
  } else {
    status.innerText = "Failed! Word was: " + target;
  }

  setTimeout(resetGame, 4000);
}

// =========================
// RESET
// =========================
function resetGame() {
  target = randomWord();
  possibleWords = [...WORDS];
  guesses = [];
  document.getElementById("status").innerText = "";
  render();

  setTimeout(playTurn, 1000);
}

// =========================
// START
// =========================
playTurn();

</script>

</body>
</html>
