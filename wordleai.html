<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>AI Wordle Widget</title>
<style>
body {
  background: transparent;
  font-family: Arial, sans-serif;
  text-align: center;
}

#board {
margin-top: 20px;
}

.row {
display: flex;
justify-content: center;
margin: 4px;
}

.tile {
width: 50px;
height: 50px;
margin: 3px;
line-height: 50px;
font-size: 24px;
font-weight: bold;
border: 2px solid #444;
text-transform: uppercase;
transition: transform 0.4s ease;
}

.green { background: #6aaa64; }
.yellow { background: #c9b458; }
.gray { background: #3a3a3c; }

.flip {
transform: rotateX(360deg);
}

#status {
margin-top: 15px;
font-size: 18px;
} </style>

</head>

<body>

<div id="board"></div>
<div id="status">Loading word list...</div>

<script>
// =========================
// GLOBAL STATE
// =========================
let WORDS = [];
let possibleWords = [];
let target = "";
let guesses = [];
let turnDelay = 1500;

// =========================
// LOAD FULL WORD LIST
// =========================
async function loadWords() {
  const res = await fetch("https://raw.githubusercontent.com/tabatkins/wordle-list/main/words");
  const text = await res.text();

  WORDS = text.split("\n")
    .map(w => w.trim().toLowerCase())
    .filter(w => w.length === 5);

  possibleWords = [...WORDS];

  document.getElementById("status").innerText = "Loaded " + WORDS.length + " words!";

  setTimeout(startGame, 1000);
}

// =========================
// RANDOM WORD
// =========================
function randomWord() {
  return WORDS[Math.floor(Math.random() * WORDS.length)];
}

// =========================
// WORDLE FEEDBACK
// =========================
function getFeedback(guess, target) {
  let result = Array(5).fill("gray");
  let targetArr = target.split("");

  // greens
  for (let i = 0; i < 5; i++) {
    if (guess[i] === target[i]) {
      result[i] = "green";
      targetArr[i] = null;
    }
  }

  // yellows
  for (let i = 0; i < 5; i++) {
    if (result[i] === "gray" && targetArr.includes(guess[i])) {
      result[i] = "yellow";
      targetArr[targetArr.indexOf(guess[i])] = null;
    }
  }

  return result;
}

// =========================
// FILTER WORDS
// =========================
function filterWords(words, guess, feedback) {
  return words.filter(word => {
    let temp = word.split("");

    // greens
    for (let i = 0; i < 5; i++) {
      if (feedback[i] === "green") {
        if (word[i] !== guess[i]) return false;
        temp[i] = null;
      }
    }

    // yellows
    for (let i = 0; i < 5; i++) {
      if (feedback[i] === "yellow") {
        if (!temp.includes(guess[i])) return false;
        temp[temp.indexOf(guess[i])] = null;
      }
    }

    // grays
    for (let i = 0; i < 5; i++) {
      if (feedback[i] === "gray") {
        if (temp.includes(guess[i])) return false;
      }
    }

    return true;
  });
}

// =========================
// SMART AI GUESS
// =========================
function aiGuess() {
  if (guesses.length === 0) return "slate"; // strong opener

  let freq = {};

  possibleWords.forEach(word => {
    for (let c of word) {
      freq[c] = (freq[c] || 0) + 1;
    }
  });

  let bestWord = possibleWords[0];
  let bestScore = -1;

  possibleWords.forEach(word => {
    let score = 0;
    let used = new Set();

    for (let c of word) {
      if (!used.has(c)) {
        score += freq[c];
        used.add(c);
      }
    }

    if (score > bestScore) {
      bestScore = score;
      bestWord = word;
    }
  });

  return bestWord;
}

// =========================
// RENDER BOARD
// =========================
function render() {
  const board = document.getElementById("board");
  board.innerHTML = "";

  guesses.forEach(row => {
    const div = document.createElement("div");
    div.className = "row";

    row.guess.split("").forEach((letter, i) => {
      const tile = document.createElement("div");
      tile.className = "tile " + row.feedback[i];
      tile.innerText = letter;
      tile.classList.add("flip");
      div.appendChild(tile);
    });

    board.appendChild(div);
  });
}

// =========================
// GAME LOOP
// =========================
function playTurn() {
  if (guesses.length >= 6) {
    endGame(false);
    return;
  }

  let guess = aiGuess();
  let feedback = getFeedback(guess, target);

  guesses.push({ guess, feedback });
  possibleWords = filterWords(possibleWords, guess, feedback);

  render();

  if (guess === target) {
    endGame(true);
    return;
  }

  setTimeout(playTurn, turnDelay);
}

// =========================
// END GAME
// =========================
function endGame(win) {
  const status = document.getElementById("status");

  if (win) {
    status.innerText = "AI solved it in " + guesses.length + " moves!";
  } else {
    status.innerText = "Failed! Word was: " + target;
  }

  setTimeout(resetGame, 4000);
}

// =========================
// RESET GAME
// =========================
function resetGame() {
  target = randomWord();
  possibleWords = [...WORDS];
  guesses = [];
  document.getElementById("status").innerText = "";
  render();

  setTimeout(playTurn, 1000);
}

// =========================
// START GAME
// =========================
function startGame() {
  target = randomWord();
  guesses = [];
  possibleWords = [...WORDS];
  document.getElementById("status").innerText = "";
  render();

  setTimeout(playTurn, 1000);
}

// =========================
// INIT
// =========================
loadWords();

</script>

</body>
</html>
